version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=qdrant
      - SPRING_AI_VECTORSTORE_QDRANT_HOST=qdrant
      - SPRING_PROFILES_ACTIVE=local
      - APP_BASE_URL=http://localhost:8080
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
