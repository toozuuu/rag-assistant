services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
    ports:
      - "8081:8080"
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=qdrant
      - SPRING_AI_VECTORSTORE_QDRANT_HOST=qdrant
      - SPRING_PROFILES_ACTIVE=local
      - APP_BASE_URL=http://localhost:8080
    volumes:
      - ./uploads:/app/uploads
      - ./conversations:/app/conversations
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
